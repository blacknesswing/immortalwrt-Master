name: openwrt X86

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: X86.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part3.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: 最大化磁盘空间
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 1024
        swap-size-mb: 2048
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true
        remove-docker-images: true

    - name: 显示磁盘空间
      run: df -h

    - name: Checkout 仓库
      uses: actions/checkout@v4

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo timedatectl set-timezone "$TZ"

        sudo apt-get update

        sudo apt-get install -y \
          build-essential flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev libelf-dev \
          python3 python3-pip python3-pyelftools \
          rsync unzip zlib1g-dev file wget \
          libgmp-dev libmpc-dev libmpfr-dev \
          libreadline-dev libglib2.0-dev \
          ccache curl cmake ninja-build \
          device-tree-compiler swig xsltproc \
          subversion patch texinfo \
          qemu-utils upx-ucl \
          libgnutls28-dev \
          p7zip-full \
          libc6-dev-i386

        sudo apt-get clean

    - name: 克隆源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        df -h

    - name: 缓存构建加速
      uses: HiGarfield/cachewrtbuild@main
      with:
        mixkey: ${{ env.REPO_BRANCH }}-${{ env.CONFIG_FILE }}
        prefix: ${{ github.workspace }}/openwrt

    - name: 自定义 feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新并安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载依赖包
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        echo "使用 $(nproc) 线程编译..."
        make -j$(nproc) || make -j1 V=s

    - name: 查看磁盘使用情况
      if: (!cancelled())
      run: df -h

    - name: 整理固件
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 上传固件
      uses: actions/upload-artifact@v4
      if: !cancelled()
      with:
        name: immortalwrt_Master_X86${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 清理老的运行日志
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 3
